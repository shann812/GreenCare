<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>GreenCare</title>

        <link rel="stylesheet" href="/src/assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <header>
        <div id="header-placeholder"></div>
    </header>
    <body>
        <div>
            <form>
                <div>
                    <label for="name">Flower name</label> 
                    <input type="text" id="name" placeholder="flower name" required>
                </div>
                <div class="mb-3">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div>
                    <option value="" disabled selected>Select a flower type</option>
                    <!-- Get flower types from server -->
                </div>
                
                <div>
                    <label for="description">Bloom Season</label>
                    <input type="checkbox" name="springSeason" value="true"> Spring
                    <input type="checkbox" name="summerSeason" value="true"> Summer
                    <input type="checkbox" name="autumnSeason" value="true"> Autumn
                    <input type="checkbox" name="winterSeason" value="true"> Winter
                </div>

                <div>
                    <label for="wateringInterval">Watering interval</label>
                    <input type="number" id="wateringInterval" min="0">
                </div>

                <div>
                    <label for="fertilizingInterval">Fertilizing interval</label>
                    <input type="number" id="fertilizingInterval" min="0">
                </div>

                <div>
                    <label for="isPrivate">Private</label>
                    <input type="checkbox" id="isPeivate">
                    <!-- TODO: find cool styles for this one -->
                </div>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="./src/js/common/app.js"></script>
        <!-- js my-flower, load users flowers -->
    </body>
</html>
