<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>GreenCare</title>

        <link rel="stylesheet" href="/src/assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <header>
        <div id="header-placeholder"></div>
    </header>
    <body>
        <div class="add-flower-container">
            <h2 class="add-flower-title">Add new flower</h2>
            <form id="addFlowerForm" class="row g-4">

            <div class="col-lg-7">

                <div class="mb-3">
                <label for="flowerName" class="form-label">Flower name</label>
                <input type="text" class="form-control" id="flowerName" placeholder="flower name" required>
                </div>

                <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="4" placeholder="Describe your flower..." maxlength="1000"></textarea>
                </div>

                <div class="mb-3">
                <label for="flowerTypeSelect" class="form-label">Flower type</label>
                <select class="form-select" id="flowerTypeSelect">
                    <option value="" disabled selected>Select a flower type</option>
                </select>
                </div>

                <div class="mb-3">
                <label class="form-label">Bloom season</label>
                <div class="season-checkboxes d-flex flex-wrap gap-4">
                    <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="springSeason" id="spring" value="Spring">
                    <label class="form-check-label" for="spring">Spring</label>
                    </div>
                    <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="summerSeason" id="summer" value="Summer">
                    <label class="form-check-label" for="summer">Summer</label>
                    </div>
                    <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="autumnSeason" id="autumn" value="Autumn">
                    <label class="form-check-label" for="autumn">Autumn</label>
                    </div>
                    <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="winterSeason" id="winter" value="Winter">
                    <label class="form-check-label" for="winter">Winter</label>
                    </div>
                </div>
                </div>

                <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="wateringInterval" class="form-label">Watering interval (days)</label>
                    <input type="number" class="form-control" id="wateringInterval" min="0" placeholder="e.g. 7">
                </div>
                <div class="col-md-6">
                    <label for="fertilizingInterval" class="form-label">Fertilizing interval (days)</label>
                    <input type="number" class="form-control" id="fertilizingInterval" min="0" placeholder="e.g. 30">
                </div>
                </div>

                <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="isPrivateCheckbox">
                <label class="form-check-label" for="isPrivate">Private (only I can see this flower)</label>
                </div>

            </div>

            <div class="col-lg-5">

                <div class="mb-4">
                <label for="flowerImage" class="form-label">Flower image</label>
                <input type="file" class="form-control" id="flowerImage" accept="image/*">
                </div>

                <div class="image-preview-wrapper">
                <div class="image-preview-container border rounded-3 bg-light d-flex align-items-center justify-content-center" style="height: 280px; overflow: hidden;">
                    <img id="imagePreview" src="#" alt="Preview" class="img-fluid" style="display: none; max-height: 100%; object-fit: cover;">
                    <div id="previewPlaceholder" class="text-muted text-center p-4">
                    <i class="bi bi-image fs-1"></i><br>
                    Image preview will appear here
                    </div>
                </div>
                </div>

            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary w-100 py-3 fw-medium fs-5">
                Create flower
                </button>
            </div>
            </form>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="./src/js/common/app.js"></script>
        <script type="module" src="./src/js/pages/create-flower.js"></script>

    </body>
